<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HQ Admin - Columbia Transport</title>
    <!-- Use main app styles for consistency -->
    <link rel="stylesheet" href="style.css">
    <!-- Leaflet.js for HQ Fleet Map -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --primary: #0ea5e9;
            --bg-dark: #0f172a;
            --card-bg: #1e293b;
            --border: #334155;
            --text-dim: #94a3b8;
        }

        body {
            background: var(--bg-dark);
            color: white;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        .admin-sidebar {
            width: 260px;
            background: var(--card-bg);
            border-right: 1px solid var(--border);
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .admin-main {
            flex: 1;
            padding: 2.5rem;
            overflow-y: auto;
            background: #020617;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .status-badge {
            padding: 6px 12px;
            border-radius: 99px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .status-online {
            background: rgba(16, 185, 129, 0.1);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        .status-loading {
            background: rgba(245, 158, 11, 0.1);
            color: #f59e0b;
            border: 1px solid rgba(245, 158, 11, 0.2);
        }

        .btn-hq {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            transition: all 0.2s;
            width: 100%;
            text-align: left;
        }

        .btn-hq-active {
            background: var(--primary);
            box-shadow: 0 0 15px rgba(14, 165, 233, 0.3);
        }

        .btn-nav {
            background: transparent;
            color: var(--text-dim);
            border: 1px solid var(--border);
            padding: 0.85rem 1.25rem;
            border-radius: 12px;
            font-weight: 500;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.75rem;
            width: 100%;
            transition: all 0.2s;
        }

        .btn-nav:hover {
            color: white;
            border-color: var(--primary);
            background: rgba(14, 165, 233, 0.05);
        }

        .load-row {
            display: grid;
            grid-template-columns: 100px 1fr 150px 100px;
            padding: 1rem;
            border-bottom: 1px solid var(--border);
            align-items: center;
            gap: 1rem;
            transition: background 0.2s;
        }

        .load-row:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        .load-row:last-child {
            border-bottom: none;
        }

        .load-row span {
            font-size: 14px;
        }

        .load-row .id {
            font-family: monospace;
            font-weight: 600;
            color: var(--primary);
        }

        .load-row .driver {
            font-weight: 600;
        }

        .load-row .time {
            color: var(--text-dim);
            font-size: 12px;
        }

        .grid-header {
            display: grid;
            grid-template-columns: 100px 1fr 150px 100px;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 8px;
            font-size: 12px;
            font-weight: 700;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
        }

        #hq-map {
            height: 450px;
            background: #0f172a;
            border-radius: 16px;
            border: 1px solid var(--border);
            overflow: hidden;
            z-index: 10;
        }

        .custom-marker {
            background: var(--primary);
            border: 2px solid white;
            border-radius: 50%;
            width: 12px;
            height: 12px;
            box-shadow: 0 0 10px rgba(14, 165, 233, 0.5);
        }

        .spin {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            body {
                flex-direction: column;
                overflow-y: auto;
            }

            .admin-sidebar {
                width: auto;
                border-right: none;
                border-bottom: 1px solid var(--border);
                padding: 1.5rem;
            }

            .admin-main {
                padding: 1rem;
                overflow-y: visible;
            }

            header {
                flex-direction: column;
                gap: 1rem;
                align-items: flex-start;
                margin-bottom: 1.5rem !important;
            }

            .grid-header {
                display: none;
            }

            .load-row {
                display: flex;
                flex-direction: column;
                align-items: flex-start;
            }

            .load-row>div:last-child {
                align-self: flex-end;
                margin-top: -20px;
            }
        }
    </style>
</head>

<body>
    <div class="admin-sidebar">
        <div style="display:flex; align-items:center; gap:0.75rem;">
            <div
                style="background:var(--primary); color:white; width:40px; height:40px; border-radius:10px; display:flex; align-items:center; justify-content:center; font-weight:900; font-size:20px;">
                CT</div>
            <h2 style="margin:0; font-size:18px;">HQ ADMIN</h2>
        </div>

        <nav style="display:flex; flex-direction:column; gap:0.75rem; margin-top:1rem;">
            <div
                style="color:var(--text-dim); font-size:11px; text-transform:uppercase; letter-spacing:1px; margin-bottom:0.25rem;">
                Fleet Hub</div>
            <button class="btn-hq btn-hq-active" id="nav-map" onclick="showSection('map')"><i data-lucide="map"></i>
                Live Fleet Map</button>
            <button class="btn-nav" id="nav-mgmt" onclick="showSection('mgmt')"><i data-lucide="users"></i>
                Management</button>
            <button class="btn-nav" id="nav-vault" onclick="showSection('vault')"><i data-lucide="folder-key"></i>
                Paperwork Vault</button>
            <button class="btn-nav" id="nav-incoming" onclick="showSection('incoming')"><i data-lucide="inbox"></i>
                Incoming Docs</button>
            <button class="btn-nav" id="nav-outgoing" onclick="showSection('outgoing')"><i data-lucide="send"></i>
                Outgoing Docs</button>
            <button class="btn-nav" id="nav-logs" onclick="showSection('logs')"><i data-lucide="clipboard-list"></i>
                Driver Logs</button>
            <button class="btn-nav" id="nav-config" onclick="showSection('config')"><i data-lucide="settings"></i>
                System Config</button>
        </nav>

        <div
            style="margin-top:auto; padding-top:1.5rem; border-top:1px solid var(--border); display:flex; gap:0.75rem; align-items:center;">
            <div
                style="width:32px; height:32px; border-radius:50%; background:#334155; display:flex; align-items:center; justify-content:center;">
                <i data-lucide="shield-check" style="width:16px; color:var(--primary);"></i>
            </div>
            <div style="font-size:12px;">
                <div style="font-weight:700;">Dispatcher</div>
                <div style="color:var(--text-dim);">HQ Portal v1.4.0</div>
            </div>
        </div>
    </div>

    <div class="admin-main">
        <header style="display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:3rem;">
            <div>
                <h1 style="margin:0; font-size:32px; font-weight:800; letter-spacing:-0.5px;">Fleet Dashboard</h1>
                <p id="active-count" style="color:var(--text-dim); margin:0.75rem 0 0 0; font-size:16px;">Initializing
                    connection...</p>
            </div>
            <div id="conn-status" class="status-badge status-loading">Connecting...</div>
        </header>

        <div class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                <h3 style="margin:0; display:flex; align-items:center; gap:0.75rem;"><i data-lucide="navigation"
                        style="color:var(--primary);"></i> Live Route Map</h3>
                <span style="font-size:12px; color:var(--text-dim);">Real-time Telemetry Enabled</span>
            </div>
            <div id="hq-map"></div>
        </div>

        <div class="card">
            <h3 style="margin:0 0 1.5rem 0; display:flex; align-items:center; gap:0.75rem;"><i
                    data-lucide="clipboard-list" style="color:var(--primary);"></i> Recent Activity</h3>
            <div class="grid-header">
                <div>Trip ID</div>
                <div>Driver / Company</div>
                <div>Timestamp</div>
                <div style="text-align:right;">Status</div>
            </div>
            <div id="activity-list">
                <p style="color:var(--text-dim); text-align:center; padding:3rem;">Establishing Supabase tunnel...</p>
            </div>
        </div>
    </div>

    <script>
        const supUrl = 'https://hdsgnhiofkozsvbqdsey.supabase.co';
        const supKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imhkc2duaGlvZmtvenN2YnFkc2V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMxMjgyMDMsImV4cCI6MjA4ODcwNDIwM30.q52Htt6YX-2ruU6cMO7sQdwwvZe1GyixjlpzmWPZQB0';
        let supabaseClient = null;
        let map = null;
        let driverMarkers = {}; // sessionID -> marker

        async function init() {
            if (window.lucide) lucide.createIcons();

            try {
                // 1. Initialize Supabase with safety check
                const supabaseLib = window.supabase;
                if (!supabaseLib || typeof supabaseLib.createClient !== 'function') {
                    console.warn("Supabase library not yet ready or failed to load. Retrying in 1s...");
                    setTimeout(init, 1000);
                    return;
                }

                supabaseClient = supabaseLib.createClient(supUrl, supKey);

                const statusEl = document.getElementById('conn-status');
                statusEl.className = 'status-badge status-online';
                statusEl.innerText = 'HQ System Live';

                // 2. Initialize Map
                initMap();

                // 3. Initial Fetch
                await refreshData();
                await fetchLatestPings();

                // 4. Real-time Subscription
                supabaseClient
                    .channel('admin_realtime')
                    .on('postgres_changes', { event: '*', schema: 'public', table: 'loads' }, payload => {
                        console.log('Load change received!', payload);
                        refreshData();
                    })
                    .on('postgres_changes', { event: 'INSERT', schema: 'public', table: 'gps_pings' }, payload => {
                        console.log('GPS Ping received!', payload);
                        updateDriverMarker(payload.new);
                    })
                    .subscribe();

            } catch (e) {
                console.error("HQ Init Error:", e);
                document.getElementById('conn-status').innerText = 'Connection Error';
            }
        }

        function initMap() {
            map = L.map('hq-map').setView([38.9517, -92.3341], 5);
            L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                attribution: '&copy; OpenStreetMap &copy; CARTO',
                subdomains: 'abcd',
                maxZoom: 20
            }).addTo(map);
        }

        async function fetchLatestPings() {
            if (!supabaseClient) return;
            try {
                // Get the most recent ping for each driver in the last 2 hours
                const twoHoursAgo = new Date(Date.now() - 2 * 60 * 60 * 1000).toISOString();
                const { data, error } = await supabaseClient
                    .from('gps_pings')
                    .select('*')
                    .order('created_at', { ascending: false });

                if (error) return;

                // Simple dedup for initial load
                const sessions = {};
                data.forEach(ping => {
                    if (!sessions[ping.trip_id]) {
                        sessions[ping.trip_id] = ping;
                        updateDriverMarker(ping);
                    }
                });
            } catch (e) {
                console.error("Error fetching latest pings:", e);
            }
        }

        function updateDriverMarker(ping) {
            if (!map || !ping.lat || !ping.lng) return;

            const sessionID = ping.trip_id || 'unknown';
            const pos = [parseFloat(ping.lat), parseFloat(ping.lng)];

            if (driverMarkers[sessionID]) {
                driverMarkers[sessionID].setLatLng(pos);
            } else {
                const icon = L.divIcon({
                    className: 'custom-marker',
                    iconSize: [12, 12]
                });
                const marker = L.marker(pos, { icon }).addTo(map);
                marker.bindPopup(`
                    <div style="color:black;">
                        <b>Driver:</b> ${ping.driver_name || 'Anonymous'}<br>
                        <b>Truck:</b> ${ping.truck_number || 'N/A'}<br>
                        <b>Last Ping:</b> ${new Date(ping.created_at).toLocaleTimeString()}
                    </div>
                `);
                driverMarkers[sessionID] = marker;
            }

            // Optional: Fit bounds if it's the first few markers
            if (Object.keys(driverMarkers).length === 1) {
                map.setView(pos, 8);
            }
        }

        async function refreshData() {
            if (!supabaseClient) return;
            const list = document.getElementById('activity-list');
            const countEl = document.getElementById('active-count');

            const { data, error } = await supabaseClient
                .from('loads')
                .select('*')
                .order('created_at', { ascending: false })
                .limit(10);

            if (error) {
                list.innerHTML = `<p style="color:#ef4444; text-align:center;">Failed to fetch: ${error.message}</p>`;
                return;
            }

            if (!data || data.length === 0) {
                list.innerHTML = `<p style="color:var(--text-dim); text-align:center; padding:3rem;">No active driver sessions found.</p>`;
                countEl.innerText = '0 Drivers active in field';
                return;
            }

            countEl.innerText = `${data.length} Recent load submissions`;

            list.innerHTML = data.map(row => `
                <div class="load-row">
                    <span class="id">${row.invoice_number || 'N/A'}</span>
                    <span class="driver"><b>${row.driver_name || row.billed_to || 'N/A'}</b><br><span style="font-size:11px;color:var(--text-dim)">${row.truck_number || ''}</span></span>
                    <span class="time">${new Date(row.created_at).toLocaleString()}</span>
                    <div style="text-align:right;">
                        ${row.pdf_url ? `<button onclick="openPdfModal('${row.pdf_url}')" style="background:var(--primary);color:white;border:none;padding:4px 12px;border-radius:8px;font-size:11px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:4px;"><i data-lucide="file-text" style="width:12px;"></i> VIEW</button>` : `<span class="status-badge status-online" style="font-size:10px;">Submitted</span>`}
                    </div>
                </div>
            `).join('');

            if (window.lucide) lucide.createIcons();
        }

        window.onload = init;

        async function showSection(section) {
            // Reset all nav buttons
            document.querySelectorAll('.btn-hq, .btn-nav').forEach(b => {
                b.className = 'btn-nav';
            });
            document.getElementById('nav-' + section).className = 'btn-hq btn-hq-active';

            const mainEl = document.querySelector('.admin-main');

            if (section === 'map') {
                location.reload();
            } else if (section === 'mgmt') {
                mainEl.innerHTML = `
                    <h1 style="color:white;margin:0 0 1.5rem 0;font-size:32px;">Active Fleet Management</h1>
                    <div id="mgmt-content" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1.5rem;">
                        <p style="color:var(--text-dim);"><i data-lucide="loader-2" class="spin"></i> Loading driver roster...</p>
                    </div>`;
                if (window.lucide) lucide.createIcons();

                if (supabaseClient) {
                    const { data: pings, error: pingError } = await supabaseClient.from('gps_pings').select('driver_name, truck_number, created_at, trip_id').order('created_at', { ascending: false });
                    const { data: logs, error: logError } = await supabaseClient.from('driver_logs').select('*').gte('created_at', new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString()).order('created_at', { ascending: true });

                    const mgmtContent = document.getElementById('mgmt-content');
                    if (pingError) {
                        mgmtContent.innerHTML = `<p style="color:#ef4444;">Error: ${pingError.message}</p>`;
                        return;
                    }

                    const drivers = {};
                    pings.forEach(p => {
                        const key = (p.driver_name || 'Anonymous') + '|' + (p.truck_number || 'N/A');
                        if (!drivers[key]) {
                            drivers[key] = {
                                ...p,
                                status: 'OFF_DUTY',
                                hours: 0,
                                lastPing: p.created_at
                            };
                        }
                    });

                    // Match logs to drivers and helper to calculate hours
                    if (logs) {
                        Object.keys(drivers).forEach(key => {
                            const [name, truck] = key.split('|');
                            const driverLogs = logs.filter(l => l.driver_name === name);
                            if (driverLogs.length > 0) {
                                const latest = driverLogs[driverLogs.length - 1];
                                drivers[key].status = latest.status;

                                // Simple hours since midnight (or first log)
                                let totalMs = 0;
                                let prevTime = new Date(new Date().setHours(0, 0, 0, 0));
                                let prevStatus = 'OFF_DUTY';

                                driverLogs.forEach(l => {
                                    const logTime = new Date(l.created_at);
                                    if (prevStatus !== 'OFF_DUTY' && prevStatus !== 'SLEEPER') {
                                        totalMs += (logTime - prevTime);
                                    }
                                    prevTime = logTime;
                                    prevStatus = l.status;
                                });
                                // Add time from last log to now if still on duty
                                if (prevStatus !== 'OFF_DUTY' && prevStatus !== 'SLEEPER') {
                                    totalMs += (new Date() - prevTime);
                                }
                                drivers[key].hours = totalMs / (1000 * 60 * 60);
                            }
                        });
                    }

                    const dArray = Object.values(drivers);
                    if (dArray.length === 0) {
                        mgmtContent.innerHTML = `<p style="color:var(--text-dim);">No active drivers found.</p>`;
                    } else {
                        mgmtContent.innerHTML = dArray.map(d => `
                            <div class="card" style="margin-bottom:0; border-left: 4px solid ${d.status === 'DRIVING' || d.status === 'ON_DUTY' ? '#10b981' : '#94a3b8'};">
                                <div style="display:flex; align-items:center; gap:1rem; margin-bottom:1rem;">
                                    <div style="width:48px; height:48px; border-radius:50%; background:var(--primary); display:flex; align-items:center; justify-content:center; position:relative;">
                                        <i data-lucide="user" style="color:white;"></i>
                                        <div style="position:absolute; bottom:0; right:0; width:12px; height:12px; border-radius:50%; background:${d.status === 'DRIVING' || d.status === 'ON_DUTY' ? '#10b981' : '#ef4444'}; border:2px solid #1e293b;"></div>
                                    </div>
                                    <div style="flex:1;">
                                        <h3 style="margin:0; font-size:18px;">${d.driver_name || 'Anonymous'}</h3>
                                        <p style="margin:4px 0 0 0; color:var(--text-dim); font-size:14px;">Vehicle: ${d.truck_number || 'Unknown'}</p>
                                    </div>
                                    <div style="text-align:right;">
                                        <div style="font-size:18px; font-weight:800; color:white;">${d.hours.toFixed(1)}h</div>
                                        <div style="font-size:10px; color:var(--text-dim); text-transform:uppercase;">Logged Today</div>
                                    </div>
                                </div>
                                <div style="display:flex; justify-content:space-between; align-items:center; font-size:12px; color:var(--text-dim); border-top:1px solid var(--border); padding-top:1rem;">
                                    <span>Last Active: ${new Date(d.lastPing).toLocaleTimeString()}</span>
                                    <span class="status-badge" style="background:${d.status === 'DRIVING' || d.status === 'ON_DUTY' ? 'rgba(16,185,129,0.1)' : 'rgba(148,163,184,0.1)'}; color:${d.status === 'DRIVING' || d.status === 'ON_DUTY' ? '#10b981' : '#94a3b8'};">${d.status.replace('_', ' ')}</span>
                                </div>
                            </div>
                        `).join('');
                        if (window.lucide) lucide.createIcons();
                    }
                }
            } else if (section === 'vault') {
                mainEl.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h1 style="color:white;margin:0;font-size:32px;">Paperwork Vault</h1>
                        <div style="display:flex; gap:1rem; align-items:center;">
                            <input type="text" id="vault-search" placeholder="Search invoices or drivers..." style="padding:0.75rem 1rem; border-radius:8px; background:rgba(0,0,0,0.2); border:1px solid var(--border); color:white; width:250px;">
                        </div>
                    </div>
                    <div class="card" style="padding:0; overflow:hidden;">
                        <div class="grid-header" style="margin:0; border-radius:0; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.3); padding:1rem 1.5rem;">
                            <div>Invoice #</div>
                            <div>Driver Info</div>
                            <div>Date Submitted</div>
                            <div style="text-align:right;">Document</div>
                        </div>
                        <div id="vault-list" style="max-height: 70vh; overflow-y:auto;">
                            <p style="color:var(--text-dim); text-align:center; padding:3rem;"><i data-lucide="loader-2" class="spin"></i> Loading historical records...</p>
                        </div>
                    </div>`;
                if (window.lucide) lucide.createIcons();

                if (supabaseClient) {
                    const fetchVault = async (searchTerm = '') => {
                        const vl = document.getElementById('vault-list');
                        let query = supabaseClient.from('loads').select('*').order('created_at', { ascending: false });

                        if (searchTerm) {
                            // Supabase ilike search across multiple columns (driver_name or invoice_number)
                            query = query.or(`driver_name.ilike.%${searchTerm}%,invoice_number.ilike.%${searchTerm}%,billed_to.ilike.%${searchTerm}%`);
                        }

                        const { data, error } = await query.limit(100);
                        if (error) {
                            vl.innerHTML = `<p style="color:#ef4444; padding:2rem;">Error: ${error.message}</p>`;
                            return;
                        }
                        if (!data || data.length === 0) {
                            vl.innerHTML = `<p style="color:var(--text-dim); padding:2rem; text-align:center;">No paperwork records found.</p>`;
                            return;
                        }

                        vl.innerHTML = data.map(row => `
                            <div class="load-row" style="padding:1rem 1.5rem; display:grid; grid-template-columns: 100px 1fr 150px 100px; align-items:center;">
                                <span class="id" style="font-family:monospace; font-weight:700; color:var(--primary); font-size:15px;">${row.invoice_number || 'N/A'}</span>
                                <span class="driver">
                                    <div style="font-weight:700; color:white; font-size:15px;">${row.driver_name || row.billed_to || 'N/A'}</div>
                                    <div style="font-size:12px; color:var(--text-dim); margin-top:2px;"><i data-lucide="truck" style="width:12px; height:12px; display:inline-block; vertical-align:middle; margin-right:4px;"></i>${row.truck_number || 'Unknown'}</div>
                                </span>
                                <span class="time" style="color:var(--text-dim); font-size:13px;">${new Date(row.created_at).toLocaleString()}</span>
                                <div style="text-align:right;">
                                    ${row.pdf_url ? `<button onclick="openPdfModal('${row.pdf_url}')" style="background:#0ea5e9; color:white; border:none; padding:8px 16px; border-radius:8px; font-size:12px; font-weight:800; display:inline-flex; align-items:center; gap:6px; cursor:pointer; transition:all 0.2s;"><i data-lucide="file-text" style="width:14px;"></i> VIEW</button>` : `<span class="status-badge status-online" style="background:rgba(16,185,129,0.1); color:#10b981; padding:6px 12px; border-radius:99px; font-size:11px; border:1px solid rgba(16,185,129,0.2);">Verified</span>`}
                                </div>
                            </div>
                        `).join('');
                        if (window.lucide) lucide.createIcons();
                    };

                    fetchVault();

                    document.getElementById('vault-search').addEventListener('input', (e) => {
                        // Debounce simple
                        clearTimeout(window.vaultSearchTimer);
                        window.vaultSearchTimer = setTimeout(() => {
                            fetchVault(e.target.value.trim());
                        }, 500);
                    });
                }
            } else if (section === 'incoming') {
                mainEl.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h1 style="color:white;margin:0;font-size:32px;">Incoming from Drivers</h1>
                        <button class="tool-btn" onclick="showSection('incoming')" style="height:auto; padding:0.5rem 1rem; flex-direction:row; gap:8px; background:rgba(255,255,255,0.05); border-radius:8px;">
                            <i data-lucide="refresh-cw" style="width:14px;"></i> Refresh
                        </button>
                    </div>
                    <div class="card" style="padding:0; overflow:hidden;">
                        <div class="grid-header" style="margin:0; border-radius:0; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.3); padding:1rem 1.5rem;">
                            <div>Sender</div>
                            <div>File Name</div>
                            <div>Submitted</div>
                            <div style="text-align:right;">Action</div>
                        </div>
                        <div id="incoming-list" style="max-height: 70vh; overflow-y:auto;">
                            <p style="color:var(--text-dim); text-align:center; padding:3rem;"><i data-lucide="loader-2" class="spin"></i> Fetching submissions...</p>
                        </div>
                    </div>`;
                if (window.lucide) lucide.createIcons();
                fetchIncomingDocs();

            } else if (section === 'outgoing') {
                mainEl.innerHTML = `
                    <h1 style="color:white;margin:0 0 1.5rem 0;font-size:32px;">Dispatch Outbound</h1>
                    <div class="card" style="max-width: 500px;">
                        <h3 style="margin-top:0;">Send Document to Driver</h3>
                        <div style="display:flex; flex-direction:column; gap:1rem;">
                            <div>
                                <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;">Target Driver ID</label>
                                <input type="text" id="target-driver-id" placeholder="e.g. DRV-102" style="width:100%; padding:0.75rem; border-radius:8px; background:rgba(0,0,0,0.2); border:1px solid var(--border); color:white;">
                            </div>
                            <div>
                                <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;">Document Name</label>
                                <input type="text" id="outbound-doc-name" placeholder="e.g. Rate-Con-123456" style="width:100%; padding:0.75rem; border-radius:8px; background:rgba(0,0,0,0.2); border:1px solid var(--border); color:white;">
                            </div>
                            <div>
                                <label style="display:block; font-size:12px; color:var(--text-dim); margin-bottom:6px;">Select PDF/Image</label>
                                <input type="file" id="outbound-file" accept=".pdf,image/*" style="width:100%; padding:0.5rem; color:var(--text-dim); font-size:13px;">
                            </div>
                            <button class="btn-hq" id="btn-send-doc" onclick="sendOutboundDoc()" style="margin-top:1rem; justify-content:center;">
                                <i data-lucide="send"></i> Dispatch Document
                            </button>
                        </div>
                    </div>
                    <div class="card" style="margin-top:2rem;">
                        <h3 style="margin-top:0;">Recently Sent</h3>
                        <div id="sent-history-list" style="font-size:13px; color:var(--text-dim);">
                            Loading history...
                        </div>
                    </div>`;
                if (window.lucide) lucide.createIcons();
                fetchSentHistory();

            } else if (section === 'logs') {
                mainEl.innerHTML = `
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem;">
                        <h1 style="color:white;margin:0;font-size:32px;">Driver Compliance Logs</h1>
                        <button class="tool-btn" onclick="showSection('logs')" style="height:auto; padding:0.5rem 1rem; flex-direction:row; gap:8px; background:rgba(255,255,255,0.05); border-radius:8px;">
                            <i data-lucide="refresh-cw" style="width:14px;"></i> Refresh
                        </button>
                    </div>
                    <div class="card" style="padding:0; overflow:hidden;">
                        <div class="grid-header" style="margin:0; border-radius:0; border-bottom:1px solid var(--border); background:rgba(0,0,0,0.3); padding:1rem 1.5rem; grid-template-columns: 150px 100px 150px 1fr 100px;">
                            <div>Driver</div>
                            <div>Status</div>
                            <div>Timestamp</div>
                            <div>Notes / Location</div>
                            <div style="text-align:right;">Odo</div>
                        </div>
                        <div id="admin-logs-list" style="max-height: 70vh; overflow-y:auto;">
                            <p style="color:var(--text-dim); text-align:center; padding:3rem;"><i data-lucide="loader-2" class="spin"></i> Loading latest compliance data...</p>
                        </div>
                    </div>`;
                if (window.lucide) lucide.createIcons();
                fetchDriverLogs();
            } else if (section === 'config') {
                mainEl.innerHTML = `<h1 style="color:white;margin:0 0 1rem 0;">System Config</h1><div class="card"><p style="color:var(--text-dim);">Supabase URL: Connected<br>Real-time: Enabled<br>RLS Policies: Active</p></div>`;
            }
        }

        async function fetchDriverLogs() {
            if (!supabaseClient) return;
            const list = document.getElementById('admin-logs-list');
            try {
                const { data, error } = await supabaseClient
                    .from('driver_logs')
                    .select('*')
                    .order('created_at', { ascending: false })
                    .limit(100);

                if (error) throw error;
                if (!data || data.length === 0) {
                    list.innerHTML = `<p style="color:var(--text-dim); text-align:center; padding:2rem;">No logs reported yet.</p>`;
                    return;
                }

                list.innerHTML = data.map(log => `
                    <div class="load-row" style="padding:1rem 1.5rem; display:grid; grid-template-columns: 150px 100px 150px 1fr 100px; font-size:13px;">
                        <span style="font-weight:700;">${log.driver_name || 'N/A'}</span>
                        <span class="status-badge" style="background:${log.status === 'DRIVING' ? 'rgba(16,185,129,0.1)' : 'rgba(100,116,139,0.1)'}; color:${log.status === 'DRIVING' ? '#10b981' : '#94a3b8'}; font-size:10px;">${log.status}</span>
                        <span class="time">${new Date(log.created_at).toLocaleString()}</span>
                        <span style="opacity:0.8;">${log.notes || '---'}</span>
                        <span style="text-align:right; font-family:monospace;">${log.odometer || '---'}</span>
                    </div>
                `).join('');
            } catch (e) {
                list.innerHTML = `<p style="color:#ef4444; padding:1rem;">Error: ${e.message}</p>`;
            }
        }

        async function fetchIncomingDocs() {
            if (!supabaseClient) return;
            const list = document.getElementById('incoming-list');
            try {
                // Documents drivers sent to Dispatch (receiver_id = 'ADMIN')
                const { data, error } = await supabaseClient
                    .from('document_transfers')
                    .select('*')
                    .eq('receiver_id', 'ADMIN')
                    .order('created_at', { ascending: false });

                if (error) {
                    // Fallback to 'loads' table for now if document_transfers doesn't exist
                    const { data: loadsData, error: loadsError } = await supabaseClient.from('loads').select('*').order('created_at', { ascending: false }).limit(20);
                    if (loadsError) throw loadsError;

                    list.innerHTML = loadsData.map(row => `
                        <div class="load-row" style="padding:1rem 1.5rem; display:grid; grid-template-columns: 100px 1fr 150px 100px;">
                            <span style="font-weight:700;">${row.driver_name || 'Driver'}</span>
                            <span style="opacity:0.8;">LOAD: ${row.invoice_number}</span>
                            <span class="time">${new Date(row.created_at).toLocaleString()}</span>
                            <div style="text-align:right;">
                                <button onclick="openPdfModal('${row.pdf_url}')" style="background:#0ea5e9; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:800;">VIEW</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    list.innerHTML = data.map(doc => `
                        <div class="load-row" style="padding:1rem 1.5rem; display:grid; grid-template-columns: 100px 1fr 150px 100px;">
                            <span style="font-weight:700;">${doc.sender_id}</span>
                            <span style="opacity:0.8;">${doc.file_name}</span>
                            <span class="time">${new Date(doc.created_at).toLocaleString()}</span>
                            <div style="text-align:right;">
                                <button onclick="openPdfModal('${doc.file_url}')" style="background:#0ea5e9; color:white; border:none; padding:6px 12px; border-radius:6px; cursor:pointer; font-size:11px; font-weight:800;">VIEW</button>
                            </div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                list.innerHTML = `<p style="padding:1rem; opacity:0.5;">Note: No transfers found. Paperwork is in the Vault.</p>`;
            }
        }

        async function fetchSentHistory() {
            if (!supabaseClient) return;
            const list = document.getElementById('sent-history-list');
            try {
                const { data, error } = await supabaseClient
                    .from('document_transfers')
                    .select('*')
                    .eq('sender_id', 'ADMIN')
                    .order('created_at', { ascending: false });

                if (error || !data || data.length === 0) {
                    list.innerHTML = `<p style="opacity:0.5;">No outbound documents recorded.</p>`;
                    return;
                }

                list.innerHTML = data.map(doc => `
                    <div style="padding:0.75rem; border-bottom:1px solid var(--border); display:flex; justify-content:space-between;">
                        <span>To: <b>${doc.receiver_id}</b> - ${doc.file_name}</span>
                        <span>${new Date(doc.created_at).toLocaleDateString()}</span>
                    </div>
                `).join('');
            } catch (e) { list.innerHTML = ''; }
        }

        async function sendOutboundDoc() {
            const target = document.getElementById('target-driver-id').value.trim();
            const name = document.getElementById('outbound-doc-name').value.trim();
            const fileInput = document.getElementById('outbound-file');
            const btn = document.getElementById('btn-send-doc');

            if (!target || !name || !fileInput.files[0]) {
                alert("Please fill all fields and select a file."); return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="spin" data-lucide="refresh-cw"></i> Sending...';
            if (window.lucide) lucide.createIcons();

            try {
                const file = fileInput.files[0];
                const fileName = `outbound/${Date.now()}_${file.name}`;

                const { data: upload, error: upError } = await supabaseClient.storage
                    .from('attachments')
                    .upload(fileName, file);

                if (upError) throw upError;

                const { data: urlData } = supabaseClient.storage.from('attachments').getPublicUrl(upload.path);

                const { error: dbError } = await supabaseClient.from('document_transfers').insert([{
                    sender_id: 'ADMIN',
                    receiver_id: target,
                    file_url: urlData.publicUrl,
                    file_name: name
                }]);

                if (dbError) throw dbError;

                alert("Document successfully dispatched to " + target);
                showSection('outgoing'); // Refresh
            } catch (e) {
                console.error(e);
                alert("Failed to send: " + e.message);
            } finally {
                btn.disabled = false;
                btn.innerHTML = '<i data-lucide="send"></i> Dispatch Document';
                if (window.lucide) lucide.createIcons();
            }
        }

        function openPdfModal(url) {
            const modal = document.getElementById('pdf-modal');
            const iframe = document.getElementById('pdf-iframe');
            if (modal && iframe) {
                iframe.src = `https://docs.google.com/viewer?url=${encodeURIComponent(url)}&embedded=true`;
                modal.style.display = 'flex';
            } else {
                window.open(url, '_blank');
            }
        }

        function closePdfModal() {
            const modal = document.getElementById('pdf-modal');
            const iframe = document.getElementById('pdf-iframe');
            modal.style.display = 'none';
            iframe.src = ''; // clear to stop loading/audio
        }
    </script>

    <!-- Fullscreen PDF Viewer Overlay -->
    <div id="pdf-modal"
        style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; flex-direction:column; align-items:center; justify-content:center; backdrop-filter:blur(5px);">
        <div
            style="width:100%; max-width:800px; height:90%; background:#1e293b; border-radius:12px; display:flex; flex-direction:column; overflow:hidden; border:1px solid var(--border); box-shadow:0 20px 40px rgba(0,0,0,0.5);">
            <div
                style="display:flex; justify-content:space-between; align-items:center; padding:12px 20px; background:#0f172a; border-bottom:1px solid var(--border);">
                <h3 style="margin:0; color:white; font-size:16px; display:flex; align-items:center; gap:8px;"><i
                        data-lucide="file-text" style="width:16px; color:var(--primary);"></i> Document Viewer</h3>
                <button onclick="closePdfModal()"
                    style="background:none; border:none; color:var(--text-dim); cursor:pointer; padding:4px;"><i
                        data-lucide="x"></i></button>
            </div>
            <iframe id="pdf-iframe" style="flex:1; width:100%; border:none; background:white;"></iframe>
        </div>
    </div>
</body>

</html>
